<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <!-- Main gear shape with 8 teeth and central hole.
       The path is a star polygon for the gear teeth, combined with a central circle for the hole,
       using fill-rule="evenodd" to create the cutout. -->
  <path
    d="M 32 2 L 41.56 8.9 L 53.21 10.79 L 55.1 22.44 L 62 32 L 55.1 41.56 L 53.21 53.21 L 41.56 55.1 L 32 62 L 22.44 55.1 L 10.79 53.21 L 8.9 41.56 L 2 32 L 8.9 22.44 L 10.79 10.79 L 22.44 8.9 Z M 32 22 A 10 10 0 1 0 32 42 A 10 10 0 1 0 32 22"
    fill="url(#rustGradient)"
    stroke="#8B2E0A"
    stroke-width="1.5"
    stroke-linejoin="round"
    fill-rule="evenodd"
  />

  <!-- Clock hand, positioned to suggest a countdown (pointing towards 5 o'clock) -->
  <path
    d="M 31 32 L 33 32 L 33 52 L 31 52 Z"
    fill="#1A1A1A"
    stroke="#000000"
    stroke-width="0.5"
    transform="rotate(150 32 32)"
  />

  <!-- Central rivet/pivot for the clock hand -->
  <circle cx="32" cy="32" r="3" fill="#1A1A1A" stroke="#000000" stroke-width="0.5" />
</svg>